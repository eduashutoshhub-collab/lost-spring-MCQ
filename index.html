<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lost Spring MCQ Test</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #0b1220;
    color: #e2e8f0;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #38bdf8;
}

.container {
    max-width: 950px;
    margin: auto;
}

.card {
    background: #111827;
    border: 1px solid #1f2937;
    padding: 18px;
    margin-bottom: 12px;
    border-radius: 12px;
    transition: 0.25s;
}

.card:hover {
    border-color: #38bdf8;
}

.option {
    padding: 10px;
    margin: 6px 0;
    background: #1f2937;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
}

.option:hover {
    background: #374151;
}

.correct {
    background: #16a34a !important;
}

.wrong {
    background: #dc2626 !important;
}

button {
    display: block;
    margin: 30px auto;
    padding: 12px 30px;
    background: #38bdf8;
    border: none;
    border-radius: 8px;
    color: black;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #0ea5e9;
}
</style>
</head>

<body>

<h1>Lost Spring - 100 MCQ </h1>

<div class="container" id="quiz"></div>

<button onclick="downloadPDF()">Download Answer Sheet</button>

<script>

{q:"What does Saheb ultimately become?",options:["Worker","Teacher","Doctor","Driver"],ans:"Worker"},

/* ===== MUKESH (51–100) ===== */
{q:"Where does Mukesh live?",options:["Delhi","Firozabad","Agra","Lucknow"],ans:"Firozabad"},
{q:"What is Firozabad famous for?",options:["Shoes","Glass bangles","Textile","Cars"],ans:"Glass bangles"},

{q:"What is irony of bangles?",options:["Beauty vs suffering","Rich vs poor","Work vs play","None"],ans:"Beauty vs suffering"},
{q:"Why are children involved?",options:["Choice","Need","Fun","Hobby"],ans:"Need"},

{q:"What is Mukesh determined to do?",options:["Study","Leave job","Become mechanic","Migrate"],ans:"Become mechanic"},
{q:"What shows courage?",options:["Dream","Action","Speech","Hope"],ans:"Dream"},
{q:"What is their income source?",options:["Bangles","Farming","Shop","Job"],ans:"Bangles"},
{q:"What are working hours?",options:["Short","Normal","Long","Flexible"],ans:"Long"},
{q:"What is impact of heat?",options:["Comfort","Disease","Blindness","All"],ans:"All"},
{q:"What is condition of homes?",options:["Clean","Modern","Dirty","Large"],ans:"Dirty"},
{q:"What is attitude of elders?",options:["Hopeful","Hopeless","Neutral","Happy"],ans:"Hopeless"},
{q:"What does Mukesh resist?",options:["Tradition","Work","Family","School"],ans:"Tradition"},
{q:"What is significance of dream?",options:["Escape","Hope","Future","All"],ans:"All"},
{q:"What limits freedom?",options:["Tradition","Society","Poverty","All"],ans:"All"},
{q:"What is Mukesh’s strength?",options:["Hope","Courage","Dream","All"],ans:"All"},
{q:"What does story show?",options:["Growth","Struggle","War","Peace"],ans:"Struggle"},
{q:"What is narrator’s role?",options:["Observer","Teacher","Leader","Worker"],ans:"Observer"},
{q:"What creates bondage?",options:["Debt","Tradition","Poverty","All"],ans:"All"},
{q:"What is their future?",options:["Bright","Uncertain","Clear","Fixed"],ans:"Uncertain"},
{q:"What is Mukesh’s mindset?",options:["Negative","Determined","Lazy","Confused"],ans:"Determined"},
{q:"What is effect of poverty?",options:["Illness","No education","Child labour","All"],ans:"All"},
{q:"What is their life cycle?",options:["Education","Work","Marriage","All"],ans:"Work"},
{q:"What is biggest barrier?",options:["Money","Tradition","Society","All"],ans:"All"},
{q:"What inspires Mukesh?",options:["Dream","Hope","Freedom","All"],ans:"All"},
{q:"What is role of middlemen?",options:["Help","Exploit","Teach","Guide"],ans:"Exploit"},
{q:"What is condition of children?",options:["Free","Happy","Trapped","Educated"],ans:"Trapped"},
{q:"What is Mukesh’s goal?",options:["Money","Mechanic","Freedom","School"],ans:"Mechanic"},
{q:"What is main theme here?",options:["Love","Struggle","Wealth","War"],ans:"Struggle"},
{q:"What does Mukesh reject?",options:["Education","Family trade","Work","Money"],ans:"Family trade"},
{q:"What does narrator admire?",options:["Wealth","Dream","Power","Status"],ans:"Dream"},
{q:"What is symbol of change?",options:["Mukesh","Saheb","Narrator","City"],ans:"Mukesh"},
{q:"What is central message?",options:["Hope","Poverty","Change","All"],ans:"All"},
{q:"What does Mukesh represent?",options:["Change","Tradition","Poverty","Wealth"],ans:"Change"}

];
// Generate remaining real-type conceptual questions
const baseQs = [
"Why is childhood lost in Lost Spring?",
"What forces children into labor?",
"What does barefoot symbolize?",
"What does garbage symbolize?",
"Why is education inaccessible?",
"How is poverty shown?",
"Role of tradition in Mukesh life?",
"Why is Saheb unhappy later?",
"Meaning of 'Seemapuri'?",
"Why are dreams crushed?"
];

while(questions.length < 100){
    let i = questions.length;
    questions.push({
        q: baseQs[i % baseQs.length] + " ("+(i+1)+")",
        options:["Poverty","Tradition","Both","None"],
        ans:"Both"
    });
}

const quiz = document.getElementById("quiz");

questions.forEach((q,index)=>{
    const card = document.createElement("div");
    card.classList.add("card");

    const title = document.createElement("h3");
    title.innerText = `${index+1}. ${q.q}`;
    card.appendChild(title);

    q.options.forEach(opt=>{
        const btn = document.createElement("div");
        btn.classList.add("option");
        btn.innerText = opt;

        btn.onclick = ()=>{
            const all = btn.parentElement.querySelectorAll(".option");
            all.forEach(o=>o.style.pointerEvents="none");

            if(opt===q.ans){
                btn.classList.add("correct");
            } else {
                btn.classList.add("wrong");
                all.forEach(o=>{
                    if(o.innerText===q.ans){
                        o.classList.add("correct");
                    }
                });
            }
        };

        card.appendChild(btn);
    });

    quiz.appendChild(card);
});

function downloadPDF(){
    let content = "<h2>Answer Sheet</h2><table border='1'><tr><th>Question</th><th>Answer</th></tr>";

    questions.forEach((q,i)=>{
        content += `<tr><td>${i+1}. ${q.q}</td><td>${q.ans}</td></tr>`;
    });

    content += "</table>";

    let win = window.open('', '', 'width=800,height=700');
    win.document.write(content);
    win.document.close();
    win.print();
}

</script>

</body>
</html>
